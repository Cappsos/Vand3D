healthy_prompts:
  - "Brain anatomy with normal symmetric ventricles and uniform gray matter"
  - "MRI showing unremarkable white matter and intact cortical structures"
  - "No enhancement or edema visible in cerebral tissue"
  - "Normal contrast washout without focal hyperintensity"
  - "Symmetrical sulci and gyri with no abnormal mass effect"
  - "Typical brain parenchyma appearance with no focal abnormalities"

tumour_prompts:
  - "Contrast-enhancing ring lesion with central necrosis and surrounding edema"
  - "Hyperintense mass causing midline shift on T2-weighted imaging"
  - "Infiltrative glioma demonstrating peripheral enhancement and vasogenic edema"
  - "Irregular enhancing neoplasm with mass effect and ventricular compression"
  - "Heterogeneous tumor core with non-enhancing necrotic center and edema"
  - "High-grade glioblastoma with contrast uptake and significant peritumoral swelling"